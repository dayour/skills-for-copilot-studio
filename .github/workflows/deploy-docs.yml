name: Deploy Docusaurus to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/site/package-lock.json

      - name: Generate changelog
        run: |
          cat > docs/src/changelog.md << 'HEADER'
          ---
          sidebar_position: 100
          title: Changelog
          ---

          # Changelog

          Auto-generated from git history on each site build.

          HEADER

          prev_date=""
          git log --format="%H %as %s" --no-merges -50 | while IFS= read -r line; do
            hash=$(echo "$line" | cut -d' ' -f1)
            short=$(echo "$hash" | cut -c1-7)
            date=$(echo "$line" | cut -d' ' -f2)
            msg=$(echo "$line" | cut -d' ' -f3-)
            if [ "$date" != "$prev_date" ]; then
              echo ""
              echo "## $date"
              echo ""
              prev_date="$date"
            fi
            echo "- [\`$short\`](https://github.com/dayour/skills-for-copilot-studio/commit/$hash) $msg"
          done >> docs/src/changelog.md

      - name: Install dependencies
        working-directory: docs/site
        run: npm ci

      - name: Build Docusaurus
        working-directory: docs/site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
