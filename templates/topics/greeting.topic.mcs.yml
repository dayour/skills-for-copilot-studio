# Name: Greeting
# Template: Conversation start greeting topic
# NOTE: Replace all _REPLACE IDs with unique random IDs before use
kind: AdaptiveDialog
beginDialog:
  kind: OnConversationStart
  id: main
  actions:
    - kind: SendActivity
      id: sendMessage_REPLACE
      activity:
        text:
          - Hello! I'm {System.Bot.Name}. How can I help you today?
          - Hi there! Welcome! What can I assist you with?
          - Greetings! I'm here to help. What would you like to know?
